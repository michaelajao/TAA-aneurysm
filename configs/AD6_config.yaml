# Configuration for AD6 Geometry (6cm Anterior-Dominant TAA)
# Data-driven primary, physics as regularizer, reduced network for stability

data:
  geometry: AD6
  phases:
  - systolic
  - diastolic
  data_dir: data/
  files:
    systolic: 6cm ASD Systolic.csv
    diastolic: 6cm ASD diastolic.csv
  subsample_factor: 3
  normalization:
    length_scale: 0.05

model:
  architecture: fourier_residual
  input_dim: 4
  hidden_dim: 128
  num_layers: 6
  use_fourier: true
  num_frequencies: 16
  fourier_scale: 1.0
  device: cuda
  nut:
    hidden_dim: 64
    num_layers: 4
    lr_multiplier: 10.0
    reg_weight: 100.0
    reg_target: 0.05
    nu_t_min: 0.001

training:
  batch_size: 4096
  wall_batch_size: 16000
  epochs: 10000
  learning_rate: 0.0001
  scheduler:
    type: CosineAnnealingLR
    eta_min: 1.0e-6
  gradient_clip: 1.0
  use_amp: false
  loss_normalization: false
  renorm_interval: 0
  log_interval: 100
  save_interval: 2500
  eval_interval: 1000
  early_stopping:
    enabled: true
    patience: 3000
    min_delta: 1.0e-6
  output_dir: experiments/AD6/

loss_weights:
  lambda_physics: 0.001
  lambda_BC_noslip: 10.0
  lambda_WSS: 1.0
  lambda_pressure: 10.0
  lambda_inlet: 10.0
  lambda_outlet: 10.0
  physics_ramp_epochs: 3000

inlet_outlet:
  enabled: true
  n_radial: 6
  n_angular: 12
  inlet_velocity:
    systolic: 0.5
    diastolic: 0.1

adaptive_weights:
  enabled: false

optimizer_strategy: adaptive_weights

physics:
  mu: 0.0035
  rho: 1060.0
  n_interior_points: 6000
  interior_batch_size: 3000
  interior_offset_range:
  - 0.05
  - 0.5
  resample_collocation_interval: 500
  resample_fraction: 0.3
  non_newtonian:
    enabled: true
    model: carreau_yasuda
    mu_inf: 0.0035
    mu_0: 0.16
    lambda: 8.2
    n: 0.2128
    a: 0.64

geometry:
  normal_estimation:
    radius: 0.01
    max_nn: 30
    orient_inward: true

random_seed: 42

evaluation:
  compute_wss_metrics: true
  compute_physics_residuals: true
  export_vtk: false

experiment:
  name: AD6
  description: "6cm Anterior-Dominant TAA — data-driven RANS with physics regularization"
  tags:
  - AD6
  - RANS
