# Configuration for AS6 Geometry (6cm Axisymmetric TAA)
# Adaptive loss weights (Wang et al. 2021), smooth collocation resampling, physics ramp

data:
  geometry: AS6
  phases:
  - systolic
  - diastolic
  data_dir: data/
  files:
    systolic: 6cm systolic.csv
    diastolic: 6cm diastolic.csv
  subsample_factor: 10
  normalization:
    length_scale: 0.05

model:
  architecture: fourier_residual
  input_dim: 4
  hidden_dim: 128
  num_layers: 10
  use_fourier: true
  num_frequencies: 32
  fourier_scale: 10.0
  device: cuda

training:
  batch_size: 4096
  wall_batch_size: 16000
  epochs: 10000
  learning_rate: 0.00005
  scheduler:
    type: StepLR
    step_size: 2000
    gamma: 0.5
  gradient_clip: 1.0
  use_amp: false
  loss_normalization: false
  renorm_interval: 0
  log_interval: 100
  save_interval: 2500
  eval_interval: 1000
  early_stopping:
    enabled: true
    patience: 3000
    min_delta: 1.0e-6
  output_dir: experiments/AS6/

loss_weights:
  lambda_physics: 0.1
  lambda_BC_noslip: 1.0
  lambda_WSS: 1.0
  lambda_pressure: 1.0
  physics_ramp_epochs: 2000

adaptive_weights:
  enabled: true
  alpha: 0.1
  update_interval: 100
  reference_loss: wss

physics:
  mu: 0.0035
  rho: 1060.0
  n_interior_points: 4000
  interior_batch_size: 4000
  interior_offset_range:
  - 0.05
  - 0.5
  resample_collocation_interval: 2000
  resample_fraction: 0.5

geometry:
  normal_estimation:
    radius: 0.01
    max_nn: 30
    orient_inward: true

random_seed: 42

evaluation:
  compute_wss_metrics: true
  compute_physics_residuals: true
  export_vtk: false

experiment:
  name: AS6
  description: "6cm Axisymmetric TAA — adaptive weights, smooth resampling, physics ramp"
  tags:
  - AS6
