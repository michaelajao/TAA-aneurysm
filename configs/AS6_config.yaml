# Configuration for AS6 Geometry (6cm Axisymmetric TAA)
# V3: physics loss annealing, periodic renorm, collocation resampling, validation split

data:
  geometry: AS6
  phases:
  - systolic
  - diastolic
  data_dir: data/
  files:
    systolic: 6cm systolic.csv
    diastolic: 6cm diastolic.csv
  subsample_factor: 10
  normalization:
    length_scale: 0.06
    velocity_scale: 1.0
    pressure_scale: 100.0
    wss_scale: 1.0

model:
  architecture: fourier_residual
  input_dim: 4
  hidden_dim: 256
  num_layers: 10
  use_fourier: true
  num_frequencies: 32
  fourier_scale: 10.0
  device: cuda

training:
  batch_size: 4096
  wall_batch_size: 8000
  epochs: 15000
  learning_rate: 0.0001
  scheduler:
    type: CosineAnnealingWarmRestarts
    T_0: 2000
    T_mult: 2
    eta_min: 1.0e-7
  gradient_clip: 1.0
  use_amp: false
  loss_normalization: true
  renorm_interval: 500
  log_interval: 100
  save_interval: 2500
  validate_interval: 500
  validation_split: 0.2
  early_stopping:
    enabled: true
    patience: 1500
    min_delta: 1.0e-6
    warmup_epochs: 2000
  output_dir: experiments/AS6_adaptive_physics/

loss_weights:
  lambda_physics: 1.0
  lambda_BC_noslip: 20.0
  lambda_WSS: 50.0
  lambda_pressure: 10.0
  physics_ramp_epochs: 2000

physics:
  mu: 0.00125
  rho: 1.0
  n_interior_points: 2000
  interior_batch_size: 2000
  interior_offset_range:
  - 0.05
  - 0.5
  resample_collocation_interval: 1000

geometry:
  normal_estimation:
    radius: 0.01
    max_nn: 30
    orient_inward: true

random_seed: 42

validation:
  compute_wss_metrics: true
  compute_physics_residuals: true
  export_vtk: true
  vtk_interval: 2500

experiment:
  name: AS6_adaptive_physics
  description: "Adaptive physics training: annealing, periodic renorm, collocation resampling, validation split"
  tags:
  - AS6
  - adaptive_physics
  - single-geometry
