# Configuration for AS5 Geometry (5cm Axisymmetric TAA)
# V4: full non-dimensionalization with Re-based physics formulation

data:
  geometry: AS5
  phases:
  - systolic
  - diastolic
  data_dir: data/
  files:
    systolic: 5cm systolic.csv
    diastolic: 5cm diastolic.csv
  subsample_factor: 10
  normalization:
    length_scale: 0.05  # L_ref (m) -- vessel diameter
    # U_ref, P_ref, tau_ref, Re are auto-computed from data and fluid properties

model:
  architecture: fourier_residual
  input_dim: 4
  hidden_dim: 128
  num_layers: 10
  use_fourier: true
  num_frequencies: 32
  fourier_scale: 10.0
  device: cuda

training:
  batch_size: 4096
  wall_batch_size: 16000
  epochs: 10000
  learning_rate: 0.0001
  scheduler:
    type: StepLR
    step_size: 2000       # decay LR every 2000 epochs
    gamma: 0.5            # halve LR at each step
  gradient_clip: 1.0
  use_amp: false
  loss_normalization: true
  renorm_interval: 0          # fixed from epoch 1 (no re-scaling)
  log_interval: 100
  save_interval: 2500
  eval_interval: 500
  early_stopping:
    enabled: true
    patience: 2000        # epochs without improvement
    min_delta: 1.0e-6
  output_dir: experiments/AS5_adaptive_physics/

loss_weights:
  lambda_physics: 1.0
  lambda_BC_noslip: 20.0
  lambda_WSS: 50.0
  lambda_pressure: 10.0
  physics_ramp_epochs: 0        # physics active from epoch 1 (normalization handles balance)

physics:
  mu: 0.0035            # Pa.s (Carreau-Yasuda mu_inf -- Newtonian approximation)
  rho: 1060.0           # kg/m^3 (blood density)
  n_interior_points: 4000
  interior_batch_size: 4000
  interior_offset_range:
  - 0.05
  - 0.5
  resample_collocation_interval: 1000

geometry:
  normal_estimation:
    radius: 0.01
    max_nn: 30
    orient_inward: true

random_seed: 42

evaluation:
  compute_wss_metrics: true
  compute_physics_residuals: true
  export_vtk: true
  vtk_interval: 2500

experiment:
  name: AS5_adaptive_physics
  description: "Non-dimensional formulation: Re-based physics, auto-computed reference scales, blood properties"
  tags:
  - AS5
  - adaptive_physics
  - single-geometry
