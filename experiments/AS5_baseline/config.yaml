data:
  data_dir: data/
  files:
    diastolic: 5cm diastolic.csv
    systolic: 5cm systolic.csv
  geometry: AS5
  normalization:
    length_scale: 0.05
    pressure_scale: 100.0
    velocity_scale: 1.0
    wss_scale: 1.0
  phases:
  - systolic
  - diastolic
  subsample_factor: 10
experiment:
  description: Baseline training for AS5 geometry with standard hyperparameters
  name: AS5_baseline
  tags:
  - AS5
  - baseline
  - single-geometry
geometry:
  normal_estimation:
    max_nn: 30
    orient_inward: true
    radius: 0.01
loss_weights:
  lambda_BC_noslip: 20.0
  lambda_WSS: 50.0
  lambda_continuity: 5.0
  lambda_physics: 1.0
  lambda_pressure: 10.0
model:
  architecture: fourier_residual
  device: cuda
  fourier_scale: 10.0
  hidden_dim: 256
  input_dim: 4
  num_frequencies: 32
  num_layers: 10
  use_fourier: true
physics:
  interior_batch_size: 2000
  interior_offset_range:
  - 0.05
  - 0.5
  mu: 0.00125
  n_interior_points: 2000
  rho: 1.0
random_seed: 42
training:
  batch_size: 4096
  early_stopping:
    enabled: true
    min_delta: 1.0e-06
    patience: 1500
    warmup_epochs: 2000
  epochs: 10000
  gradient_clip: 1.0
  learning_rate: 0.0001
  log_interval: 100
  output_dir: experiments/AS5_baseline/
  save_interval: 1000
  scheduler:
    gamma: 0.5
    step_size: 1000
    type: StepLR
  use_amp: true
  validate_interval: 500
  wall_batch_size: 8000
validation:
  compute_physics_residuals: true
  compute_wss_metrics: true
  export_vtk: true
  vtk_interval: 1000
