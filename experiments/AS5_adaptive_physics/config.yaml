data:
  data_dir: data/
  files:
    diastolic: 5cm diastolic.csv
    systolic: 5cm systolic.csv
  geometry: AS5
  normalization:
    length_scale: 0.05
  phases:
  - systolic
  - diastolic
  subsample_factor: 10
evaluation:
  compute_physics_residuals: true
  compute_wss_metrics: true
  export_vtk: true
  vtk_interval: 2500
experiment:
  description: 'Non-dimensional formulation: Re-based physics, auto-computed reference
    scales, blood properties'
  name: AS5_adaptive_physics
  tags:
  - AS5
  - adaptive_physics
  - single-geometry
geometry:
  normal_estimation:
    max_nn: 30
    orient_inward: true
    radius: 0.01
loss_weights:
  lambda_BC_noslip: 20.0
  lambda_WSS: 50.0
  lambda_physics: 1.0
  lambda_pressure: 10.0
  physics_ramp_epochs: 0
model:
  architecture: fourier_residual
  device: cuda
  fourier_scale: 10.0
  hidden_dim: 128
  input_dim: 4
  num_frequencies: 32
  num_layers: 10
  use_fourier: true
physics:
  interior_batch_size: 4000
  interior_offset_range:
  - 0.05
  - 0.5
  mu: 0.0035
  n_interior_points: 4000
  resample_collocation_interval: 1000
  rho: 1060.0
random_seed: 42
training:
  batch_size: 4096
  early_stopping:
    enabled: true
    min_delta: 1.0e-06
    patience: 2000
  epochs: 10000
  eval_interval: 500
  gradient_clip: 1.0
  learning_rate: 0.0001
  log_interval: 100
  loss_normalization: true
  output_dir: experiments/AS5_adaptive_physics/
  renorm_interval: 0
  save_interval: 2500
  scheduler:
    gamma: 0.5
    step_size: 2000
    type: StepLR
  use_amp: false
  wall_batch_size: 16000
